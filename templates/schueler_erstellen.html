{% extends "base.html" %}

{% block title %}Schüler erstellen{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-user-plus"></i> Neuen Schüler hinzufügen</h1>
    <p class="text-muted">Schüler zur Klasse {{ klasse.name }} hinzufügen</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-user"></i> Schüler-Informationen</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">
                                    <i class="fas fa-user"></i> Vorname *
                                </label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nachname" class="form-label">
                                    <i class="fas fa-user"></i> Nachname *
                                </label>
                                <input type="text" class="form-control" id="nachname" name="nachname" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="geburtsdatum" class="form-label">
                                    <i class="fas fa-birthday-cake"></i> Geburtsdatum
                                </label>
                                <input type="date" class="form-control" id="geburtsdatum" name="geburtsdatum">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="geschlecht" class="form-label">
                                    <i class="fas fa-venus-mars"></i> Geschlecht
                                </label>
                                <select class="form-select" id="geschlecht" name="geschlecht">
                                    <option value="">Bitte wählen</option>
                                    <option value="M">Männlich</option>
                                    <option value="W">Weiblich</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="notfallkontakt" class="form-label">
                            <i class="fas fa-phone"></i> Notfallkontakt
                        </label>
                        <input type="text" class="form-control" id="notfallkontakt" name="notfallkontakt" 
                               placeholder="Telefonnummer für Notfälle">
                    </div>
                    
                    <div class="mb-3">
                        <label for="familie_id" class="form-label">
                            <i class="fas fa-home"></i> Familie
                        </label>
                        <select class="form-select" id="familie_id" name="familie_id">
                            <option value="">Keine Familie zuordnen</option>
                            {% for familie in familien %}
                            <option value="{{ familie.id }}">{{ familie.familienname }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">
                            Wählen Sie eine Familie aus oder <a href="{{ url_for('familie_erstellen') }}">erstellen Sie eine neue Familie</a>.
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-save"></i> Schüler erstellen
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a href="{{ url_for('klassenbuch_details', klasse_id=klasse.id) }}" class="btn btn-secondary w-100">
                                <i class="fas fa-times"></i> Abbrechen
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
